services:
  zookeeper:
    image: zookeeper:3.8
    container_name: zookeeper
    networks:
      fastapi_network:
    hostname: zookeeper

  clickhouse-node1:
    image: clickhouse/clickhouse-server:23
    container_name: clickhouse-node1
    hostname: clickhouse-node1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/node1:/etc/clickhouse-server
    depends_on:
      - zookeeper
    networks:
      fastapi_network:
        ipv4_address: 172.28.0.80

  clickhouse-node2:
    image: clickhouse/clickhouse-server:23
    container_name: clickhouse-node2
    hostname: clickhouse-node2
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ./data/node2:/etc/clickhouse-server
    depends_on:
      - zookeeper
    networks:
      fastapi_network:
        ipv4_address: 172.28.0.81