services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_test
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: test_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config:/etc/clickhouse-server/users.d/

  vertica:
    image: vertica/vertica-ce:latest
    container_name: vertica_test
    ports:
      - "5433:5433"
    environment:
      - TZ=UTC
      - VERTICA_SESSION_TIMEOUT=600
    volumes:
      - vertica_data:/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/vertica/bin/vsql -U dbadmin -c 'SELECT 1;' || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 180s

volumes:
  clickhouse_data:
  vertica_data: