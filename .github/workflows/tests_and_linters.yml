name: Lint and Test with Matrix & Telegram

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12, 3.13]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r test-requirements.txt

      - name: Analysing the code with all linters
        run: |
          make lint

      - name: Send Telegram notification on lint success
        if: success()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🧾 Job *${{ github.job }}* on *${{ github.workflow }}*
            Status: ✅ Success!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram notification on lint failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 Job *${{ github.job }}* on *${{ github.workflow }}* failed!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  tests:
    name: Run Tests via Compose
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3.11.1

      - name: Install Docker Compose CLI plugin
        run: |
          mkdir -p ~/.docker/cli-plugins/
          curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose

      - name: Prepare .env files
        run: |
          cp admin_service/config/.env.example admin_service/config/.env
          cp common/.env.example common/.env
          cp common/.env.example tests/utils/.env

      - name: Run test services with Docker Compose
        run: |
          docker compose -f tests/docker-compose.yml -f .github/ci-compose.override.yml up -d || { docker compose logs; exit 1; }

      - name: Wait for containers
        run: sleep 120

      - name: Run tests inside container
        run: |
          docker exec tests sh -c "\
            pip install --upgrade pip && \
            pip install -r /opt/tests/requirements.txt && \
            python3 /opt/tests/utils/wait_for_es.py && \
            python3 /opt/tests/utils/wait_for_redis.py && \
            python3 /opt/tests/utils/wait_for_nginx.py && \
            coverage run -m pytest /opt/tests/ && \
            coverage report -m"

      - name: Stop containers
        if: always()
        run: |
          docker compose -f tests/docker-compose.yml down

      - name: Send Telegram notification on tests success
        if: success()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🧾 Job *${{ github.job }}* on *${{ github.workflow }}*
            Status: ✅ Success!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram notification on tests failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 Job *${{ github.job }}* on *${{ github.workflow }}* failed!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  full_project_compose_up:
    name: Full project Docker Compose up
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3.11.1

      - name: Install Docker Compose CLI plugin
        run: |
          mkdir -p ~/.docker/cli-plugins/
          curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose

      - name: Prepare .env files for Docker Compose
        run: |
          cp admin_service/config/.env.example admin_service/config/.env
          cp common/.env.example common/.env

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml -f .github/ci-compose.override.yml up -d
          docker compose ps

      - name: Wait for services to be healthy
        run: sleep 120

      - name: Stop containers
        if: always()
        run: |
          docker compose down

      - name: Send Telegram notification on full project compose UP success
        if: success()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🧾 Job *${{ github.job }}* on *${{ github.workflow }}*
            Status: ✅ Success!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram notification on full project compose UP failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 Job *${{ github.job }}* on *${{ github.workflow }}* failed!
            Repo: https://github.com/${{ github.repository }}
            Branch: ${{ github.ref_name }}
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
